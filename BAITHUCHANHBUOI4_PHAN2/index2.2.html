<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <title>Register</title>
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.2.1.min.js"></script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js"
        type="text/javascript"></script>


    <style>
        .error {
            color: red;
            font-size: 14px;
        }
    </style>

</head>

<body>
    <form id="orderForm">

        <label>Sản phẩm</label>
        <select id="product">
            <option value="">-- Chọn sản phẩm --</option>
            <option value="Ao">Áo</option>
            <option value="Quan">Quần</option>
            <option value="Giay">Giày</option>
        </select>
        <div class="error" id="productError"></div>

        <br>

        <label>Số lượng</label>
        <input type="number" id="quantity" min="1" max="99">
        <div class="error" id="quantityError"></div>

        <br>

        <label>Ngày giao hàng</label>
        <input type="date" id="deliveryDate">
        <div class="error" id="dateError"></div>

        <br>

        <label>Địa chỉ giao</label>
        <input type="text" id="address">
        <div class="error" id="addressError"></div>

        <br>

        <label>Ghi chú</label>
        <textarea id="note" maxlength="200"></textarea>
        <div id="charCount">0/200</div>
        <div class="error" id="noteError"></div>

        <br>

        <label>Thanh toán</label>
        <br>
        <input type="radio" name="payment" value="COD"> COD
        <input type="radio" name="payment" value="Bank"> Chuyển khoản
        <input type="radio" name="payment" value="Wallet"> Ví điện tử
        <div class="error" id="paymentError"></div>

        <br>

        <h3>Tổng tiền: <span id="totalPrice">0</span> VND</h3>

        <button type="submit">Đặt hàng</button>

    </form>

    <div id="confirmBox" style="display:none;border:1px solid #000;padding:10px;margin-top:20px;">
        <h3>Xác nhận đơn hàng</h3>
        <div id="orderSummary"></div>

        <button id="confirmBtn">Xác nhận</button>
        <button id="cancelBtn">Hủy</button>
    </div>

    <h2 id="successMessage"></h2>



    <script src="script2.2.js"></script>
</body>

</html>
